<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>LinkedOut</h1>
      <span class="version">v1.0</span>
    </div>
    <p class="tagline">Honest Translation Engine</p>

    <div class="toggle-row">
      <span>Enable</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <span id="postCount">0</span> posts translated
    </div>

    <div class="actions">
      <button id="clearCacheBtn">Clear Cache</button>
      <button id="openOptionsBtn">Settings</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
